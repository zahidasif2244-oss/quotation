<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #e8e8e8;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #1a237e; margin-bottom: 30px; font-size: 28px; }
.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
@media (max-width:900px) { .layout { grid-template-columns: 1fr; } }
.form-panel {
  background: #fff; border-radius: 10px; padding: 25px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.form-panel h2 { color: #1a237e; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 8px; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-weight: 600; font-size: 13px; color: #333; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 5px;
  font-size: 14px; font-family: inherit; transition: border 0.3s;
}
.form-group input:focus, .form-group textarea:focus { outline: none; border-color: #1a237e; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
table.items-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
table.items-table th, table.items-table td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; font-size: 13px; }
table.items-table th { background: #1a237e; color: #fff; font-size: 12px; }
table.items-table input { width: 100%; border: none; padding: 4px; font-size: 13px; font-family: inherit; }
table.items-table input:focus { outline: 1px solid #1a237e; }
.terms-list { list-style: none; padding: 0; }
.terms-list li { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.terms-list input[type="text"] { flex: 1; padding: 5px 8px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; }
.terms-list input[type="checkbox"] { width: auto; }
.btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.btn { padding: 12px 30px; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
.btn-primary { background: #1a237e; color: #fff; }
.btn-primary:hover { background: #283593; }
.btn-success { background: #2e7d32; color: #fff; }
.btn-success:hover { background: #388e3c; }
.btn-danger { background: #c62828; color: #fff; }
.btn-danger:hover { background: #d32f2f; }
.preview-panel {
  background: #fff; border-radius: 10px; padding: 25px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.preview-panel h2 { color: #1a237e; margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid #1a237e; padding-bottom: 8px; }
.preview-container {
  width: 100%; background: #fff; border: 1px solid #ddd;
  overflow: auto; position: relative;
}
#preview-content {
  width: 816px; min-height: 1056px; margin: 0 auto;
  position: relative;
  font-family: 'Segoe UI', 'Arial', sans-serif;
  background: #fff;
  overflow: visible;
}
#preview-content .bg-img {
  position: absolute; top: 0; left: 0;
  width: 816px; height: 1056px; z-index: 0;
}
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #999; }
.empty-state p { margin-top: 10px; }
.image-upload-group { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
.image-upload-box { flex: 1; min-width: 140px; }
.image-upload-box label { display: block; font-weight: 600; font-size: 13px; color: #333; margin-bottom: 4px; }
.image-upload-box .upload-area {
  border: 2px dashed #ccc; border-radius: 6px; padding: 10px;
  text-align: center; cursor: pointer; transition: border 0.3s;
}
.image-upload-box .upload-area:hover { border-color: #1a237e; }
.image-upload-box .upload-area img { max-width: 100%; max-height: 60px; display: block; margin: 0 auto; }
.image-upload-box input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>LetterPad - Quotation Generator</h1>
  <div class="layout">
    <div class="form-panel">
      <h2>Letter Details</h2>
      <div class="form-row">
        <div class="form-group" style="position:relative;">
          <label>Recipient <span style="font-weight:400;font-size:11px;color:#666;">(search or type)</span></label>
          <input type="text" id="recipient-input" value="MONDELEZ PAKISTAN LIMITED - Miss Sadia" oninput="onRecipientInput(this)" autocomplete="off">
          <div id="recipient-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-radius:0 0 5px 5px;max-height:180px;overflow-y:auto;z-index:10;"></div>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="text" id="date">
        </div>
      </div>
      <div class="form-group">
        <label>Select Company <span style="font-weight:400;font-size:11px;color:#666;">(filter)</span></label>
        <select id="select-company" onchange="onSelectCompany()">
          <option value="">-- Select Company --</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Attention</label>
          <input type="text" id="attention" value="Miss Sadia">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="company" value="MONDELEZ PAKISTAN LIMITED">
        </div>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="location" value="Karachi">
      </div>
      <div class="form-group">
        <label>Sender Company</label>
        <input type="text" id="sender-company" value="ICE AGE Industries PVT LTD">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Reference</label>
          <input type="text" id="reference" value="Quote/26/58">
        </div>
        <div class="form-group" style="display:flex;align-items:flex-end;">
          <button class="btn" style="padding:8px 16px;font-size:13px;background:#e0e0e0;width:100%;" onclick="showRecipients()">Manage Recipients</button>
        </div>
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="subject" value="Quotation">
      </div>
      <div class="form-group">
        <label>Salutation</label>
        <input type="text" id="salutation" value="Dear Sir,">
      </div>
      <div class="form-group">
        <label>Introductory Text</label>
        <textarea id="intro" rows="2">We are pleased to quote you the best prices of our widely used product as under;</textarea>
      </div>
      <div class="form-group">
        <label>Items Table</label>
        <table class="items-table">
          <thead>
            <tr>
              <th style="width:18%">Model</th>
              <th style="width:12%">Qty</th>
              <th style="width:35%">Unit Price</th>
              <th style="width:35%">Total Amount (PKR)</th>
            </tr>
          </thead>
          <tbody id="items-body">
            <tr>
              <td><input type="text" class="item-model" value="MVC-400"></td>
              <td><input type="text" class="item-qty" value="50" oninput="calcRow(this)"></td>
              <td><input type="text" class="item-price" value="Rs.115,000/-" oninput="calcRow(this)"></td>
              <td><input type="text" class="item-total" value="Rs.5,750,000/-" readonly></td>
            </tr>
            <tr>
              <td><input type="text" class="item-model" value="MVC-270"></td>
              <td><input type="text" class="item-qty" value="30" oninput="calcRow(this)"></td>
              <td><input type="text" class="item-price" value="Rs.100,000/-" oninput="calcRow(this)"></td>
              <td><input type="text" class="item-total" value="Rs.3,000,000/-" readonly></td>
            </tr>
          </tbody>
        </table>
        <button class="btn" style="margin-top:8px;padding:6px 16px;font-size:13px;background:#e0e0e0;" onclick="addRow()">+ Add Row</button>
      </div>
      <div class="form-group">
        <label>Grand Total</label>
        <input type="text" id="grand-total" value="Rs.8,750,000/-" style="font-weight:bold;font-size:15px;">
      </div>

document.getElementById('sig-preview').src = DEFAULT_SIG;

let sigPos = { x: 520, y: 710 };
let dragData = null;
function makeDragable(el) {
  el.onmousedown = function(e) {
    e.preventDefault();
    dragData = { el: el, startX: e.clientX, startY: e.clientY, origX: sigPos.x, origY: sigPos.y };
    document.onmousemove = function(ev) {
      sigPos.x = dragData.origX + ev.clientX - dragData.startX;
      sigPos.y = dragData.origY + ev.clientY - dragData.startY;
      dragData.el.style.left = sigPos.x + 'px';
      dragData.el.style.top = sigPos.y + 'px';
    };
    document.onmouseup = function() { document.onmousemove = null; document.onmouseup = null; dragData = null; };
  };
}

function loadImage(input, previewId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) { document.getElementById(previewId).src = e.target.result; };
  reader.readAsDataURL(file);
}

function parsePkr(v) {
  return parseFloat(v.replace('Rs.','').replace(/,/g,'').replace('/-','').trim()) || 0;
}
function fmtPkr(n) {
  return 'Rs.' + n.toLocaleString('en-PK') + '/-';
}
function calcRow(el) {
  const row = el.closest('tr');
  const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
  const price = parsePkr(row.querySelector('.item-price').value);
  const total = qty * price;
  row.querySelector('.item-total').value = fmtPkr(total);
  calcGrandTotal();
}
function calcGrandTotal() {
  let sum = 0;
  document.querySelectorAll('.item-total').forEach(inp => sum += parsePkr(inp.value));
  document.getElementById('grand-total').value = fmtPkr(sum);
}

function getFormData() {
  const items = [];
  document.querySelectorAll('#items-body tr').forEach(row => {
    items.push({
      model: row.querySelector('.item-model').value,
      qty: row.querySelector('.item-qty').value,
      price: row.querySelector('.item-price').value,
      total: row.querySelector('.item-total').value
    });
  });
  const terms = [];
  document.querySelectorAll('#terms-list li').forEach(li => {
    const checked = li.querySelector('input[type="checkbox"]').checked;
    const text = li.querySelector('input[type="text"]').value;
    if (text.trim()) terms.push({ checked, text });
  });
  return {
    attention: document.getElementById('attention').value || splitRecipient(document.getElementById('recipient-input').value).attn,
    date: document.getElementById('date').value,
    company: document.getElementById('company').value || splitRecipient(document.getElementById('recipient-input').value).name,
    senderCompany: document.getElementById('sender-company').value,
    location: document.getElementById('location').value,
    reference: document.getElementById('reference').value,
    subject: document.getElementById('subject').value,
    salutation: document.getElementById('salutation').value,
    intro: document.getElementById('intro').value,
    items, terms,
    grandTotal: document.getElementById('grand-total').value,
    closing: document.getElementById('closing').value,
    signature: document.getElementById('sig-preview').src
  };
}

function generatePreview() {
  const data = getFormData();
  const preview = document.getElementById('preview-content');
  const empty = document.getElementById('empty-state');

  const itemsHtml = data.items.map((item, i) => {
    const bg = i % 2 === 0 ? '#f9f9f9' : '#ffffff';
    return '<tr style="background:' + bg + '">' +
      '<td style="padding:4px 6px;border:1px solid #000;font-size:11px;">' + item.model + '</td>' +
      '<td style="padding:4px 6px;border:1px solid #000;font-size:11px;text-align:center;">' + item.qty + '</td>' +
      '<td style="padding:4px 6px;border:1px solid #000;font-size:11px;text-align:right;">' + item.price + '</td>' +
      '<td style="padding:4px 6px;border:1px solid #000;font-size:11px;text-align:right;">' + item.total + '</td>' +
      '</tr>';
  }).join('');

  const termsHtml = data.terms.filter(t => t.checked).map(t =>
    '<li style="margin-bottom:3px;font-size:11px;">&#8226; ' + t.text + '</li>'
  ).join('');

  const closingHtml = data.closing.replace(/\n/g, '<br>');

  preview.innerHTML =
    '<img src="' + BG + '" class="bg-img">' +
    '<div style="position:relative;z-index:1;padding:175px 48px 78px 48px;min-height:1056px;display:flex;flex-direction:column;">' +
      '<div style="font-size:11px;font-weight:500;margin-top:10px;">Attention: <strong>' + data.attention + '</strong></div>' +
      '<div style="font-size:11px;font-weight:500;margin-bottom:6px;">Company: <strong>' + data.company + '</strong></div>' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;">' +
        '<div style="width:48%;">' + data.location + '</div>' +
        '<div style="width:48%;text-align:right;">Dated: ' + data.date + '<br>Reference: ' + data.reference + '</div>' +
      '</div>' +
      '<div style="font-weight:bold;font-size:13px;margin-bottom:6px;text-decoration:underline;">Subject: ' + data.subject + '</div>' +
      '<div style="font-size:12px;margin-bottom:6px;">' + data.salutation + '</div>' +
      '<div style="font-size:11px;margin-bottom:10px;line-height:1.4;">' + data.intro + '</div>' +
      '<table style="width:100%;border-collapse:collapse;margin-bottom:10px;">' +
        '<thead><tr>' +
          '<th style="background:#1a237e;color:#fff;padding:5px 6px;border:1px solid #000;font-size:10px;text-align:center;width:22%;">Model</th>' +
          '<th style="background:#1a237e;color:#fff;padding:5px 6px;border:1px solid #000;font-size:10px;text-align:center;width:12%;">Quantity</th>' +
          '<th style="background:#1a237e;color:#fff;padding:5px 6px;border:1px solid #000;font-size:10px;text-align:center;width:33%;">Unit Price (Excluding all taxes)</th>' +
          '<th style="background:#1a237e;color:#fff;padding:5px 6px;border:1px solid #000;font-size:10px;text-align:center;width:33%;">Total Amount in PKR</th>' +
        '</tr></thead>' +
        '<tbody>' + itemsHtml +
        '<tr style="font-weight:bold;"><td colspan="3" style="text-align:right;padding:4px 6px;border:1px solid #000;font-size:12px;">Grand Total</td>' +
        '<td style="text-align:right;padding:4px 6px;border:1px solid #000;font-size:12px;">' + data.grandTotal + '</td></tr>' +
        '</tbody></table>' +
      '<div style="margin-bottom:10px;"><h4 style="font-size:11px;margin-bottom:4px;">Terms &amp; Conditions:</h4><ul style="padding-left:18px;">' + termsHtml + '</ul></div>' +
      '<div style="font-size:11px;line-height:1.4;margin-bottom:10px;">' + closingHtml + '</div>' +
      '<div style="margin-top:auto;"></div>' +
      '<div style="font-size:11px;font-weight:500;padding-bottom:8px;text-align:left;">For <strong>' + data.senderCompany + '</strong></div>' +
      '<div id="sig-drag" style="position:absolute;left:' + sigPos.x + 'px;top:' + sigPos.y + 'px;cursor:grab;z-index:2;">' +
        '<img src="' + data.signature + '" style="max-height:68px;pointer-events:none;">' +
      '</div>' +
    '</div>';

  preview.style.display = 'block';
  empty.style.display = 'none';
  document.getElementById('btn-edit').style.display = '';
  const sigEl = document.getElementById('sig-drag');
  if (sigEl) makeDragable(sigEl);
}

function saveAsPDF() {
  if (window._pdfSaving) return;
  window._pdfSaving = true;
  generatePreview();
  const el = document.getElementById('preview-content');
  const imgs = el.querySelectorAll('img');
  let loaded = 0;
  const total = imgs.length;
  let done = false;
  const doPdf = function() {
    if (done) return;
    done = true;
    html2canvas(el, {
      scale: 2, useCORS: true, allowTaint: true,
      letterRendering: true, logging: false,
      width: 816, windowWidth: 816
    }).then(function(canvas) {
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('portrait', 'in', 'letter');
      const pw = 8.5, ph = 11;
      const cw = canvas.width, ch = canvas.height;
      const ratio = Math.min(pw / cw, ph / ch);
      pdf.addImage(imgData, 'JPEG', (pw - cw * ratio) / 2, (ph - ch * ratio) / 2, cw * ratio, ch * ratio);
      pdf.save('Quotation.pdf');
      window._pdfSaving = false;
    });
  };
  if (total === 0) { doPdf(); return; }
  imgs.forEach(function(img) {
    img.onload = function() { loaded++; if (loaded >= total) doPdf(); };
    if (img.complete) img.onload();
  });
}

function addRow() {
  const tbody = document.getElementById('items-body');
  const tr = document.createElement('tr');
  tr.innerHTML = '<td><input type="text" class="item-model" value=""></td>' +
    '<td><input type="text" class="item-qty" value="0" oninput="calcRow(this)"></td>' +
    '<td><input type="text" class="item-price" value="Rs.0/-" oninput="calcRow(this)"></td>' +
    '<td><input type="text" class="item-total" value="Rs.0/-" readonly></td>';
  tbody.appendChild(tr);
}

function addTerm() {
  var list = document.getElementById('terms-list');
  var li = document.createElement('li');
  li.innerHTML = '<input type="checkbox" checked><input type="text" value="" placeholder="Enter term">';
  list.appendChild(li);
}

function editMode() {
  document.getElementById('preview-content').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('btn-edit').style.display = 'none';
  document.getElementById('btn-preview').style.display = '';
  document.getElementById('btn-save').style.display = '';
  document.getElementById('btn-reset').style.display = '';
  window.scrollTo(0, 0);
}

function splitRecipient(val) {
  const idx = val.indexOf(' - ');
  if (idx > 0) return { name: val.slice(0, idx).trim(), attn: val.slice(idx + 3).trim() };
  return { name: val.trim(), attn: '' };
}

function getRecipients() {
  try { return JSON.parse(localStorage.getItem('letterpad_recipients') || '[]'); } catch(e) { return []; }
}
function saveRecipients(list) {
  localStorage.setItem('letterpad_recipients', JSON.stringify(list));
  renderRecipients();
}
function renderRecipients() {
  const list = getRecipients();
  const el = document.getElementById('recipients-list');
  if (list.length === 0) { el.innerHTML = '<p style="color:#999;font-size:13px;">No recipients saved yet.</p>'; return; }
  el.innerHTML = list.map(function(r, i) {
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;font-size:13px;">' +
      '<span><strong>' + r.name + '</strong>' + (r.attn ? ' - ' + r.attn : '') + (r.loc ? '<br><span style="color:#666;">' + r.loc + '</span>' : '') + '</span>' +
      '<div><button class="use-rec-btn" data-idx="' + i + '" style="padding:3px 10px;border:1px solid #1a237e;border-radius:3px;background:transparent;color:#1a237e;cursor:pointer;font-size:12px;margin-right:4px;">Use</button>' +
      '<button class="del-rec-btn" data-idx="' + i + '" style="padding:3px 10px;border:1px solid #c62828;border-radius:3px;background:transparent;color:#c62828;cursor:pointer;font-size:12px;">Del</button></div></div>';
  }).join('');
}
function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).filter(function(l) { return l.trim(); });
    if (lines.length < 2) { alert('CSV must have a header row + at least one data row.'); return; }
    var header = lines[0].split(',').map(function(h) { return h.trim().toLowerCase(); });
    var nameIdx = -1, attnIdx = -1, locIdx = -1;
    header.forEach(function(h, i) {
      if (h === 'name' || h === 'company') nameIdx = i;
      if (h === 'attention' || h === 'attn') attnIdx = i;
      if (h === 'location' || h === 'loc' || h === 'address') locIdx = i;
    });
    if (nameIdx === -1) { alert('CSV must have a "name" or "company" column.'); return; }
    var list = JSON.parse(localStorage.getItem('letterpad_recipients') || '[]');
    var count = 0;
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',').map(function(c) { return c.trim(); });
      var name = cols[nameIdx] || '';
      if (!name) continue;
      var attn = attnIdx >= 0 ? (cols[attnIdx] || '') : '';
      var loc = locIdx >= 0 ? (cols[locIdx] || '') : '';
      list.push({ name: name, attn: attn, loc: loc });
      count++;
    }
    saveRecipients(list);
    alert('Imported ' + count + ' recipient(s) successfully.');
  };
  reader.readAsText(file);
  input.value = '';
}
function exportCSV() {
  var list = JSON.parse(localStorage.getItem('letterpad_recipients') || '[]');
  if (list.length === 0) { alert('No recipients to export.'); return; }
  var csv = 'Company,Attention,Location\n';
  list.forEach(function(r) {
    var name = (r.name || '').replace(/,/g, ' ');
    var attn = (r.attn || '').replace(/,/g, ' ');
    var loc = (r.loc || '').replace(/,/g, ' ');
    csv += name + ',' + attn + ',' + loc + '\n';
  });
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'recipients.csv';
  a.click();
}

function addRecipient() {
  const name = document.getElementById('rec-name').value.trim();
  const attn = document.getElementById('rec-attn').value.trim();
  const loc = document.getElementById('rec-loc').value.trim();
  if (!name) { alert('Company / Name is required'); return; }
  const list = getRecipients();
  list.push({ name: name, attn: attn, loc: loc });
  saveRecipients(list);
  document.getElementById('rec-name').value = '';
  document.getElementById('rec-attn').value = '';
  document.getElementById('rec-loc').value = '';
}
function deleteRecipient(i) {
  const list = getRecipients();
  list.splice(i, 1);
  saveRecipients(list);
}
function selectRecipient(i) {
  const r = getRecipients()[i];
  document.getElementById('company').value = r.name;
  document.getElementById('attention').value = r.attn || '';
  document.getElementById('location').value = r.loc || '';
  document.getElementById('recipient-input').value = r.name + (r.attn ? ' - ' + r.attn : '');
  closeRecipients();
}
function showRecipients() {
  renderRecipients();
  document.getElementById('recipients-modal').style.display = 'flex';
}
document.getElementById('recipients-list').onclick = function(e) {
  const btn = e.target.closest('button');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  if (btn.classList.contains('use-rec-btn')) {
    selectRecipient(idx);
  } else if (btn.classList.contains('del-rec-btn')) {
    deleteRecipient(idx);
  }
};
function closeRecipients() {
  document.getElementById('recipients-modal').style.display = 'none';
}
function onRecipientInput(el) {
  const val = el.value.toLowerCase();
  const list = getRecipients();
  const sug = document.getElementById('recipient-suggestions');
  if (!val) { sug.style.display = 'none'; return; }
  const matches = list.filter(function(r) { return r.name.toLowerCase().includes(val) || (r.attn && r.attn.toLowerCase().includes(val)); });
  if (matches.length === 0) { sug.style.display = 'none'; return; }
  sug.innerHTML = matches.map(function(r, i) {
    return '<div data-idx="' + i + '" style="padding:6px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #eee;">' +
      '<strong>' + r.name + '</strong>' + (r.attn ? ' - ' + r.attn : '') + (r.loc ? '<br><span style="color:#666;font-size:11px;">' + r.loc + '</span>' : '') + '</div>';
  }).join('');
  sug.style.display = 'block';
}
document.getElementById('recipient-suggestions').onclick = function(e) {
  const div = e.target.closest('[data-idx]');
  if (!div) return;
  const r = getRecipients()[parseInt(div.dataset.idx)];
  if (!r) return;
  document.getElementById('company').value = r.name;
  document.getElementById('attention').value = r.attn || '';
  document.getElementById('location').value = r.loc || '';
  document.getElementById('recipient-input').value = r.name + (r.attn ? ' - ' + r.attn : '');
  document.getElementById('recipient-suggestions').style.display = 'none';
};
document.addEventListener('click', function(e) {
  if (!e.target.closest('#recipient-input') && !e.target.closest('#recipient-suggestions')) {
    document.getElementById('recipient-suggestions').style.display = 'none';
  }
});

function resetForm() { if (confirm('Reset all fields to default?')) location.reload(); }

// --- Company Filter Dropdown ---
function populateCompanySelect() {
  var list = [];
  try { list = JSON.parse(localStorage.getItem('letterpad_recipients') || '[]'); } catch(e) { list = []; }
  if (!Array.isArray(list)) list = [];
  var uniqueCompanies = [];
  var seen = {};
  list.forEach(function(r) {
    if (r.name && !seen[r.name]) {
      seen[r.name] = true;
      uniqueCompanies.push(r.name);
    }
  });
  uniqueCompanies.sort();
  var sel = document.getElementById('select-company');
  if (!sel) return;
  sel.innerHTML = '<option value="">-- Select Company --</option>';
  uniqueCompanies.forEach(function(c) {
    sel.innerHTML += '<option value="' + c.replace(/"/g, '&quot;') + '">' + c + '</option>';
  });
}

function onSelectCompany() {
  var sel = document.getElementById('select-company');
  var val = sel.value;
  if (!val) return;
  var list = JSON.parse(localStorage.getItem('letterpad_recipients') || '[]');
  var match = null;
  for (var i = 0; i < list.length; i++) {
    if (list[i].name === val) { match = list[i]; break; }
  }
  if (!match) return;
  document.getElementById('company').value = match.name;
  document.getElementById('attention').value = match.attn || '';
  document.getElementById('location').value = match.loc || '';
  document.getElementById('recipient-input').value = match.name + (match.attn ? ' - ' + match.attn : '');
}

// Patch saveRecipients to also refresh company dropdown
var _origSave = saveRecipients;
saveRecipients = function(list) {
  _origSave(list);
  populateCompanySelect();
};

function setCurrentDate() {
  var d = new Date();
  var day = ('0' + d.getDate()).slice(-2);
  var month = ('0' + (d.getMonth() + 1)).slice(-2);
  var year = d.getFullYear();
  document.getElementById('date').value = day + '/' + month + '/' + year;
}

setCurrentDate();
populateCompanySelect();
